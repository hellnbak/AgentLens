receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource:
    attributes:
      - key: agentlens.deployment.cloud
        value: aws
        action: upsert
      - key: service.namespace
        value: agentlens
        action: upsert

exporters:
  debug:
    verbosity: basic
  file/logs:
    path: /data/otel/agentlens-logs.jsonl
  file/traces:
    path: /data/otel/agentlens-traces.jsonl
  awss3/archive:
    s3uploader:
      region: ${env:AWS_REGION}
      s3_bucket: ${env:AGENTLENS_S3_BUCKET}
      s3_prefix: raw-otel
    marshaler: otlp_json

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/logs, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
