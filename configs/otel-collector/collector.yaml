receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  resource:
    attributes:
      - key: agentlens.pipeline
        value: agentlens
        action: upsert
  transform/redact:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - replace_pattern(body, "(?i)(sk-ant-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{10,})", "[REDACTED_TOKEN]")
          - replace_pattern(body, "AKIA[0-9A-Z]{16}", "[REDACTED_AWS_ACCESS_KEY]")
          - replace_pattern(body, "(?s)-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----.*?-----END (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----", "[REDACTED_PRIVATE_KEY]")
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: agentlens
  file/logs:
    path: /var/lib/agentlens/agentlens-logs.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10
    format: json
  file/traces:
    path: /var/lib/agentlens/agentlens-traces.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10
    format: json
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/redact, batch]
      exporters: [file/logs, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/traces, debug]
