receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource:
    attributes:
      - key: agentlens.deployment.cloud
        value: gcp
        action: upsert
      - key: service.namespace
        value: agentlens
        action: upsert

exporters:
  debug:
    verbosity: basic
  file/logs:
    path: /data/otel/agentlens-logs.jsonl
  file/traces:
    path: /data/otel/agentlens-traces.jsonl
  googlecloud:
    project: ${env:GOOGLE_CLOUD_PROJECT}

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/logs, googlecloud]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/traces, googlecloud]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [googlecloud]
