rules:
  - id: secret.aws_access_key
    category: secret
    severity: high
    risk_score: 90
    description: Possible AWS access key detected.
    patterns:
      - 'AKIA[0-9A-Z]{16}'
      - 'ASIA[0-9A-Z]{16}'
  - id: secret.github_token
    category: secret
    severity: high
    risk_score: 90
    description: Possible GitHub token detected.
    patterns:
      - 'gh[pousr]_[A-Za-z0-9_]{20,}'
  - id: secret.anthropic_or_openai_key
    category: secret
    severity: high
    risk_score: 90
    description: Possible AI provider API key detected.
    patterns:
      - 'sk-ant-[A-Za-z0-9_-]{20,}'
      - 'sk-[A-Za-z0-9_-]{30,}'
  - id: secret.slack_token
    category: secret
    severity: high
    risk_score: 85
    description: Possible Slack token detected.
    patterns:
      - 'xox[baprs]-[A-Za-z0-9-]{10,}'
  - id: secret.private_key
    category: secret
    severity: critical
    risk_score: 100
    description: Private key material detected.
    patterns:
      - '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
  - id: secret.jwt
    category: secret
    severity: medium
    risk_score: 65
    description: Possible JWT detected.
    patterns:
      - 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
