global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector-exported-metrics
    static_configs:
      - targets: ['otel-collector:8889']
  - job_name: agentlens-detector
    static_configs:
      - targets: ['detector:8090']

  - job_name: agentlens-action-router
    static_configs:
      - targets: ['action-router:8091']
